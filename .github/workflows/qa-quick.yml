name: WordPress QA — Quick Check (Every PR)

on:
  pull_request:
    branches: ['*']

jobs:
  quick-check:
    name: Quick QA Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer, phpcs

      - name: Install WPCS
        run: |
          composer global require wp-coding-standards/wpcs --no-interaction --no-progress
          phpcs --config-set installed_paths "$(composer global config home)/vendor/wp-coding-standards/wpcs"

      - name: PHP Lint (changed files only)
        run: |
          git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD \
            | grep '\.php$' | grep -v vendor \
            | xargs -I {} php -l {} 2>&1 | grep -v "No syntax errors" || true

      - name: PHPCS on changed files
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD \
            | grep '\.php$' | grep -v vendor | tr '\n' ' ')
          if [ -n "$CHANGED" ]; then
            phpcs --standard=WordPress --severity=8 $CHANGED || true
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Quick Playwright smoke test
        run: |
          npm ci
          npx playwright install --with-deps chromium
          USE_PLAYGROUND=true npx playwright test \
            tests/playwright/tpa/core.spec.js \
            tests/playwright/nexterwp/core.spec.js \
            --grep "@smoke" \
            --reporter=line \
            --timeout=60000 || true
        env:
          CI: 'true'
        continue-on-error: true
