name: WordPress QA — Full Gauntlet

on:
  push:
    branches: ['release/**', 'main']
  pull_request:
    branches: ['main']
  workflow_dispatch:
    inputs:
      plugin:
        description: 'Plugin to test (tpa|nexterwp|all)'
        default: 'all'

jobs:
  # ── Job 1: Code Quality ──────────────────────────────────────────────────────
  code-quality:
    name: Code Quality (PHP Lint + PHPCS + PHPStan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer, phpcs, phpstan
          coverage: none

      - name: Install WPCS + VIP Standards
        run: |
          composer global require \
            wp-coding-standards/wpcs \
            automattic/vipwpcs \
            phpcompatibility/phpcompatibility-wp \
            szepeviktor/phpstan-wordpress \
            php-stubs/wordpress-stubs \
            --no-interaction --no-progress
          phpcs --config-set installed_paths \
            "$(composer global config home)/vendor/wp-coding-standards/wpcs,$(composer global config home)/vendor/automattic/vipwpcs"

      - name: PHP Lint
        run: |
          find . -name "*.php" \
            -not -path "*/vendor/*" \
            -not -path "*/node_modules/*" \
            -exec php -l {} \; | grep -v "No syntax errors" | grep -v "^$" \
            && echo "PHP lint errors found" && exit 1 || echo "PHP lint: clean"

      - name: PHPCS — WordPress + VIP Standards
        run: phpcs --standard=config/phpcs.xml --report=checkstyle . | tee phpcs-report.xml
        continue-on-error: true

      - name: Annotate PHPCS results
        uses: staabm/annotate-pull-request-from-file@v1
        with:
          file: phpcs-report.xml
          notice-as-warning: true
        if: github.event_name == 'pull_request'
        continue-on-error: true

      - name: PHPStan
        run: phpstan analyse --configuration=config/phpstan.neon --no-progress
        continue-on-error: true

  # ── Job 2: E2E Tests via WordPress Playground ────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright + WP Playground)
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (WP Playground)
        env:
          USE_PLAYGROUND: 'true'
          WP_ADMIN_USER: admin
          WP_ADMIN_PASS: password
          CI: 'true'
        run: npx playwright test tests/playwright/ --reporter=html
        timeout-minutes: 15

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: reports/playwright-html/
          retention-days: 14

  # ── Job 3: Lighthouse Performance ────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: e2e-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start WordPress Playground
        run: |
          npm install -g @wp-playground/cli @lhci/cli
          npx @wp-playground/cli server \
            --blueprint=setup/playground-blueprint.json \
            --port=9400 &
          sleep 20

      - name: Run Lighthouse CI
        run: lhci autorun --config=config/lighthouserc.json
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: reports/lighthouse/
          retention-days: 14

  # ── Job 4: Compatibility matrix ──────────────────────────────────────────────
  compatibility:
    name: PHP ${{ matrix.php }} / WP ${{ matrix.wp }}
    runs-on: ubuntu-latest
    needs: code-quality
    strategy:
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3']
        wp: ['6.3', '6.4', '6.5', 'latest']
        exclude:
          - php: '7.4'
            wp: '6.5'
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: PHP Lint on PHP ${{ matrix.php }}
        run: |
          find . -name "*.php" -not -path "*/vendor/*" \
            -exec php -l {} \; | grep -v "No syntax errors" \
            && exit 1 || echo "Clean on PHP ${{ matrix.php }}"

  # ── Summary ───────────────────────────────────────────────────────────────────
  qa-summary:
    name: QA Summary
    runs-on: ubuntu-latest
    needs: [code-quality, e2e-tests, lighthouse, compatibility]
    if: always()
    steps:
      - name: Post summary
        run: |
          echo "## WordPress QA Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lighthouse | ${{ needs.lighthouse.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Compatibility | ${{ needs.compatibility.result }} |" >> $GITHUB_STEP_SUMMARY
